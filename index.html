<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My-Calendar</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="images/android-chrome-512x512.png">
</head>

<body>

<header class="topbar">
  <div class="brand">
    <div class="logo">🗓️</div>
    <h1>My-Calendar</h1>
  </div>
</header>

<div id="notifBanner" class="notif-banner" hidden>
  <span>🔔 Enable notifications for reminders.</span>
  <div class="notif-banner-actions">
    <button id="notifAllowBtn" class="btn primary">Enable</button>
    <button id="notifDismissBtn" class="btn ghost">Dismiss</button>
  </div>
</div>

<main class="wrap">

<section class="panel">
  <div class="panel-head">
    <div>
      <h2>Calendar</h2>

      <div class="monthbar">
        <button id="prevBtn" class="btn">←</button>

        <div class="month-year-group">
          <select id="monthSelect" class="month-select"></select>
          <select id="yearSelect" class="year-select"></select>
        </div>

        <button id="nextBtn" class="btn">→</button>
        <button id="todayBtn" class="btn ghost">Today</button>
      </div>
    </div>

    <div class="head-right">
      <input id="searchInput" class="search" placeholder="Search…" />
      <button id="themeToggle" class="btn ghost">🌙 Dark</button>
    </div>
  </div>

  <div class="dow">
    <div>Sun</div><div>Mon</div><div>Tue</div>
    <div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
  </div>

  <div id="grid" class="grid"></div>
</section>

<aside class="panel side">

  <div class="panel-head">
    <h2>Selected Day</h2>
    <p id="dayLabel" class="muted">—</p>
  </div>

  <div id="selectedEvents" class="day-list"></div>

  <div class="panel-head">
    <h2>Upcoming Events</h2>
  </div>

  <div id="upcomingEvents" class="day-list"></div>

  <div class="panel-foot">
    <button id="addBtn" class="btn primary">+ Add</button>
    <button id="editBtn" class="btn">Edit</button>
    <button id="deleteSideBtn" class="btn danger">Delete</button>
    <button id="exportBtn" class="btn ghost">Export</button>
    <button id="clearAllBtn" class="btn clear-custom">Clear All</button>
  </div>

</aside>

</main>

<div id="backdrop" class="backdrop" hidden></div>

<dialog id="eventModal" class="modal">
  <form id="eventForm" method="dialog">
    <div class="modal-head">
      <div id="modalTitle" class="modal-title">New event</div>
      <button id="closeBtn" class="btn ghost">✕</button>
    </div>

    <div class="form">
      <input id="titleInput" required placeholder="Event name">
      <input id="dateInput" type="date" required>
      <input id="endDateInput" type="date">
      <input id="startInput" type="time">
      <input id="endInput" type="time">
      <textarea id="descInput" placeholder="Description"></textarea>
      <select id="remindInput">
        <option value="off">Reminder Off</option>
        <option value="popup">Popup</option>
        <option value="60">1 hour before</option>
        <option value="30">30 mins before</option>
        <option value="15">15 mins before</option>
      </select>
      <select id="colorInput">
        <option value="default">Default</option>
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
      </select>
    </div>

    <div class="modal-foot">
      <button id="deleteBtn" class="btn danger" hidden>Delete</button>
      <button id="cancelBtn" class="btn ghost">Cancel</button>
      <button class="btn primary">Save</button>
    </div>

    <input type="hidden" id="idInput">
  </form>
</dialog>

<script src="app.js"></script>
</body>
</html>
